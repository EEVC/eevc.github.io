research_areas:
- name: Non-structural Component Seismic Performance Evaluation
  description: >-
    Nonlinear FEA-based seismic evaluation of large nonstructural components
    such as generators &mdash; capturing rocking and sliding behavior and
    developing practical, code-ready design methods.
- name: Composite Moment Frame Connection Seismic Performance
  description: >-
    Analysis-based verification of joint rotation performance using
    finite-element models of composite connections, enabling reliable and
    economical performance certification of welded steel and steel-concrete
    composite joints.
- name: Blast-Resistant Design and Protective Structures
  description: >-
    Blast design of civil defense shelters using nonlinear FEA and
    SDOF-based analysis, with full-scale fabrication and static loading
    tests of steel-concrete composite structures planned by 2026.
- name: Braced Frame Optimization
  description: >-
    Parametric studies for optimal placement and cross-section design of
    braces, balancing strength, stiffness, ductility, constructability,
    and economy.
- name: Vibration Control and Serviceability
  description: >-
    Vibration performance evaluation using VDV concepts for sensitive
    facilities such as hospitals and semiconductor plants, together with
    design and optimization of tuned mass dampers for floors and structures.
