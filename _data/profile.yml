short_bio_text_justify: true
short_bio: >-
  <p>
    The <strong>Earthquake Engineering and Vibration Control (EEVC) Lab</strong>
    at Changwon National University, led by Prof. <a href="#pi">Sung-Yong Kim</a>,
    studies the structural safety of buildings and equipment under
    <strong>extreme loads</strong> &mdash; earthquake, blast, fire, and
    human-induced vibration. Our work spans steel and composite structural
    systems, moment-frame connections, braced frames, blast-resistant
    protective structures, and nonstructural components such as access floors,
    battery racks, generators, and distributed equipment.
  </p>
  <p>
    Our methodology integrates <strong>full-scale and scaled-model experiments</strong>
    (shake-table, UTM, impact-echo and acceleration measurements) with advanced
    <strong>nonlinear finite element analysis</strong> (LS-DYNA, ABAQUS,
    MIDAS Gen, OpenSees) and <strong>data-driven methods</strong> (FFT signal
    processing, generative models, full-waveform inversion) &mdash; applied
    to civil defense shelters, refractory wall diagnostics for electric
    melting furnaces, seismic retrofit of telecom battery racks, floor
    vibration of timber buildings, and condition monitoring of cultural
    heritage structures.
  </p>

