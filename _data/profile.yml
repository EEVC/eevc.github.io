short_bio: >-
  <p>
    The <strong>Earthquake Engineering and Vibration Control (EEVC) Lab</strong>
    at Changwon National University, led by Prof. <a href="#pi">Sung-Yong Kim</a>,
    works on the seismic and vibration performance of buildings and their
    components &mdash; from steel and composite structural systems to
    nonstructural components such as access floors, battery racks, and
    distributed equipment.
  </p>
  <p>
    Our research combines <strong>experiments</strong> (shake-table, UTM,
    impact-echo and acceleration measurements), <strong>finite element analysis</strong>
    (LS-DYNA, ABAQUS, MIDAS Gen, OpenSees), and <strong>data-driven methods</strong>
    (FFT signal processing, generative models, full-waveform inversion) to
    address real engineering problems &mdash; refractory wall diagnostics for
    electric melting furnaces, seismic retrofit of telecom battery racks,
    floor-vibration of timber buildings, and condition monitoring of cultural
    heritage structures.
  </p>

